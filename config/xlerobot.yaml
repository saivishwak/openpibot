robot:
  id: xlerobot
  port_left_base: /dev/ttyACM1
  port_right_head: /dev/ttyACM0
  left_arm_id: left_follower_arm
  right_arm_id: right_follower_arm
  max_relative_target: 8.0
  use_degrees: true
  home_pose:
    left_arm_shoulder_pan: 21.8462
    left_arm_shoulder_lift: -91.1648
    left_arm_elbow_flex: 84.3956
    left_arm_wrist_flex: 42.2418
    left_arm_wrist_roll: -5.4945
    left_arm_gripper: 0.7644
    right_arm_shoulder_pan: -35.6923
    right_arm_shoulder_lift: -100.7033
    right_arm_elbow_flex: 67.6044
    right_arm_wrist_flex: 57.2308
    right_arm_wrist_roll: 5.7582
    right_arm_gripper: 0.6241
cameras:
  left_wrist:
    type: opencv
    path: /dev/v4l/by-path/pci-0000:0e:00.0-usb-0:4.4:1.0-video-index0
    fps: 30
    width: 640
    height: 480
    fourcc: MJPG
  head:
    type: opencv
    path: /dev/v4l/by-path/pci-0000:0e:00.0-usb-0:3:1.0-video-index0
    fps: 30
    width: 640
    height: 480
    fourcc: MJPG
  right_wrist:
    type: opencv
    path: /dev/v4l/by-path/pci-0000:0e:00.0-usb-0:4.1:1.0-video-index0
    fps: 30
    width: 640
    height: 480
    fourcc: MJPG
dataset:
  repo_id: saivishwak/xlerobot-vr-pick-place-pen
  home_before_episode: true
  fps: 30
  push_to_hub: false
  root: ~/.cache/huggingface/lerobot/saivishwak/xlerobot-vr-pick-place-pen
pi05:
  server_host: 127.0.0.1
  server_port: 8000
  action_horizon: 50
  control_fps: 30
vr:
  kp: 0.75
  wrist_delta_limit_deg: 8.0
  pos_ema_alpha: 0.22
  ori_ema_alpha: 0.25
  pos_deadzone_m: 0.002
  rot_deadzone_deg: 0.7
  max_ee_step_m: 0.003
  quest_video:
    roles:
    - head
    - left_wrist
    - right_wrist
    base_port: 5600
    bitrate_kbps: 2500
    flip_method: rotate-180
    brightness: 0.0
    contrast: 1.0
    saturation: 1.0
  wrist_motor_polarity:
    left:
      flex: 1
      roll: -1
    right:
      flex: -1
      roll: 1
  joint_deg_caps:
    shoulder_pan: 5.0
    shoulder_lift: 5.0
    elbow_flex: 5.0
    wrist_flex: 6.0
    wrist_roll: 10.0
    gripper: 15.0
  joint_command_deadband_deg:
    shoulder_pan: 0.18
    shoulder_lift: 0.18
    elbow_flex: 0.18
    wrist_flex: 0.25
    wrist_roll: 0.25
    gripper: 0.0
  joint_command_filter_weights:
  - 0.4
  - 0.3
  - 0.2
  - 0.1
gripper:
  open_value: 0
  closed_value: 100
